services:
  # Backend Node.js Service
  - type: web
    name: support-assistant-backend
    env: node
    buildCommand: "cd backend && npm install"
    # init-db will ensure the ephemeral SQLite DB is created on deploy/restart
    startCommand: "cd backend && npm run init-db && npm start"
    envVars:
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        fromService:
          type: web
          name: support-assistant-frontend
          property: url
      - key: GEMINI_API_KEY
        sync: false

  # Frontend Static Site
  - type: web
    name: support-assistant-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: support-assistant-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
